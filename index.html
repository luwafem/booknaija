<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="F3SK-7i8eBWySBEXBdkntBmUciozFrm2etjCS6lYkbk" />
    
    <!-- Primary Meta Tags (Fallback before React loads) -->
    <title>BookNaija - Your Business, One Simple Link</title>
    <meta name="title" content="BookNaija - Book Services, Buy Products, Pay Upfront" />
    <meta name="description" content="Stop the DM to book cycle. Turn your bio into a professional storefront where clients book services, buy products, and pay upfront via Paystack." />
    <meta name="keywords" content="booking, Nigeria, services, products, Paystack, business, storefront, bio link" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="BookNaija Technologies" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="BookNaija - Your Business, One Simple Link" />
    <meta property="og:description" content="Stop the DM to book cycle. Turn your bio into a professional storefront." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="BookNaija" />
    <meta property="og:locale" content="en_NG" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="/" />
    <meta name="twitter:title" content="BookNaija - Your Business, One Simple Link" />
    <meta name="twitter:description" content="Stop the DM to book cycle. Turn your bio into a professional storefront." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Canonical is handled dynamically by React Helmet inside the app -->
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/fav.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- ─── PERFORMANCE: Preconnect to critical third‑party origins ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />   <!-- Keep crossorigin for fonts.gstatic.com -->
    <link rel="preconnect" href="https://api.paystack.co" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" />
    <link rel="preconnect" href="https://drmmnfvldgfszslvtnee.supabase.co" /> <!-- Supabase hostname -->
    
    <!-- ─── PERFORMANCE: Preload critical static assets (optional, remove if warnings bother you) ─── -->
    <!--
    <link rel="preload" as="image" href="/fav-removebg.png" type="image/png" />
    <link rel="preload" as="image" href="/og-image.png" type="image/png" />
    <link rel="preload" as="image" href="/fav.png" type="image/png" />
    -->
    
    <!-- ─── PERFORMANCE: Preload the combined Google Fonts stylesheet ─── -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    />
    
    <!-- ─── PERFORMANCE: Load fonts non‑blocking ─── -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      />
    </noscript>
    
    <!-- ─── AdSense (async, non‑blocking) ─── -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1898000452698308"
      crossorigin="anonymous"
    ></script>

    <!-- Tell Netlify Prerendering to wait for React to load before taking a snapshot -->
    <script>
      window.prerenderReady = false;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
