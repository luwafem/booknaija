<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Primary Meta Tags (Fallback before React loads) -->
    <title>BookNaija - Your Business, One Simple Link</title>
    <meta name="title" content="BookNaija - Book Services, Buy Products, Pay Upfront" />
    <meta name="description" content="Stop the DM to book cycle. Turn your bio into a professional storefront where clients book services, buy products, and pay upfront via Paystack." />
    <meta name="keywords" content="booking, Nigeria, services, products, Paystack, business, storefront, bio link" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="BookNaija Technologies" />
    
    <!-- Open Graph / Facebook (Using relative paths so it works on .netlify.app AND your future custom domain) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="BookNaija - Your Business, One Simple Link" />
    <meta property="og:description" content="Stop the DM to book cycle. Turn your bio into a professional storefront." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="BookNaija" />
    <meta property="og:locale" content="en_NG" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="/" />
    <meta name="twitter:title" content="BookNaija - Your Business, One Simple Link" />
    <meta name="twitter:description" content="Stop the DM to book cycle. Turn your bio into a professional storefront." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Canonical is handled dynamically by React Helmet inside the app -->
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/fav.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" />
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1898000452698308"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
