[build]
  command = "npm run build"
  publish = "dist"
  # ⚠️ CRITICAL FOR LAUNCH: Tell Netlify where your backend files are.
  # If your folder is NOT named "netlify/functions", change the path below!
  # Examples: "src/functions", "api", "backend/functions"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "!node_modules/.cache/**",
    "!**/*.test.js",
    "!**/*.spec.js"
  ]
  [functions."*.js"]
    memory = 1024
    timeout = 30

# ─── SCHEDULED FUNCTIONS ───
[functions."check-expired-subscriptions"]
  schedule = "0 0 * * *"  # Runs daily at midnight UTC

[functions."send-expiry-reminders"]
  schedule = "0 8 * * *"  # Runs daily at 8 AM UTC

# ─── RATE LIMITING ───
# Global fallback – catches any function not explicitly limited below
[[rate_limit]]
  pattern = "/.netlify/functions/*"
  rate = "100 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/initialize-payment"
  rate = "10 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/save-business"
  rate = "5 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/affiliate-login"
  rate = "5 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/save-affiliate"
  rate = "5 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/submit-offline-booking"
  rate = "10 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/verify-offline-booking"
  rate = "10 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/dashboard-login"
  rate = "5 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/send-reset-otp"
  rate = "3 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/verify-reset-otp"
  rate = "3 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/get-dashboard-questions"
  rate = "5 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/get-business-items"
  rate = "30 per minute"

[[rate_limit]]
  pattern = "/.netlify/functions/update-security"
  rate = "5 per minute"

# ─── NEW: Subscription history endpoint ───
[[rate_limit]]
  pattern = "/.netlify/functions/get-subscription-history"
  rate = "10 per minute"

# ─── REDIRECTS (ORDER MATTERS!) ───

# 1. API PROXY: Maps frontend /api/* calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 2. BLOG BASE: Prevents 404 on the /blog homepage
[[redirects]]
  from = "/blog"
  to = "/index.html"
  status = 200

# 3. BLOG POSTS: Serve static HTML files directly
[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat/index.html"
  status = 200
  force = true

# 4. SPA FALLBACK: Catch-all for React Router (Must be last!)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── SECURITY HEADERS ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=()"

# ─── CACHE POLICIES ───

# Static assets (JS, CSS, images) – long-term cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages (including blog) – no cache (serve fresh on each visit)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/blog/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap & robots.txt – cache for 24 hours
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Favicon and other static root files – cache for 1 week
[[headers]]
  for = "/fav*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"