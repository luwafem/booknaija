[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # ❌ REMOVE: NETLIFY_PRERENDER = "true" (deprecated)

# ─── BLOG POSTS: Serve static HTML files directly ───
[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat/index.html"
  status = 200
  force = true

# ─── SPA FALLBACK: Only for non-blog routes ───
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── SECURITY HEADERS ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=()"

# ─── CACHE POLICIES ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/blog/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"