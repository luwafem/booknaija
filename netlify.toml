# Build settings
[build]
  command = "npm run build"
  publish = "dist"
  # Forces Netlify to use Node 18 for building AND running functions
  NODE_VERSION = "18"

# Functions config
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ─── SPA ROUTING ───
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── SECURITY HEADERS (Global) ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ─── CACHE STATIC ASSETS (Forever - they have hashed filenames) ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── CACHE IMAGES ───
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── SITEMAP & ROBOTS (Cache briefly so Google sees updates fast) ───
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "text/plain"

# ─── HTML FILES (Never cache - always serve fresh meta tags for SEO) ───
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── ROOT INDEX.HTML ───
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"